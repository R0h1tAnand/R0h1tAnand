<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rohit Anand - Cyber Security Professional</title>
    <style>
        body {
            background-color: #0D1117;
            color: #C9D1D9;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            text-align: center;
            max-width: 800px;
        }

        h1 {
            font-size: 2.5rem;
        }

        .wave {
            display: inline-block;
            animation: wave-animation 2.5s infinite;
        }

        @keyframes wave-animation {
            0% {
                transform: rotate(0deg);
            }

            10% {
                transform: rotate(14deg);
            }

            20% {
                transform: rotate(-8deg);
            }

            30% {
                transform: rotate(14deg);
            }

            40% {
                transform: rotate(-4deg);
            }

            50% {
                transform: rotate(10deg);
            }

            60% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(0deg);
            }
        }

        .skills,
        .socials {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }

        .skills img,
        .socials img {
            width: 50px;
            height: 50px;
            transition: transform 0.3s;
        }

        .skills img:hover,
        .socials img:hover {
            transform: scale(1.2);
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }

            100% {
                opacity: 1;
            }
        }

        .cursor {
            display: inline-block;
            width: 10px;
            height: 20px;
            background-color: #C9D1D9;
            animation: blink 1s infinite;
            margin-left: 2px;
        }

        @keyframes slideIn {
            from {
                transform: translateX(-100%);
            }

            to {
                transform: translateX(0);
            }
        }

        .animate-left {
            animation: slideIn 1s forwards;
        }

        .followers {
            margin: 10px 0;
        }

        @keyframes moveBg {
            from {
                background-position: 0 0;
            }

            to {
                background-position: 100% 100%;
            }
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://user-images.githubusercontent.com/115187902/230700872-d5f44b85-56c7-4e27-80a4-6e2db901e60c.gif') repeat;
            opacity: 0.05;
            z-index: -1;
            animation: moveBg 20s linear infinite;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1 class="animate-left">Hi <span class="wave">👋</span> My name is Rohit Anand</h1>
        <p class="animate-left">An individual dedicated to becoming a proficient Cyber Security professional.</p>
        <p class="animate-left">🌍 I'm based in India.<br>🧠 I'm currently learning Bash and Python.</p>
        <div class="followers animate-left">Always trying to Do better than yesterday......🙃<span></span></div>
        <div class="skills animate-left">
            <img src="https://img.icons8.com/color/48/000000/c-programming.png" alt="C">
            <img src="https://img.icons8.com/color/48/000000/c-plus-plus-logo.png" alt="C++">
            <img src="https://img.icons8.com/color/48/000000/java-coffee-cup-logo.png" alt="Java">
            <img src="https://img.icons8.com/color/48/000000/python.png" alt="Python">
            <img src="https://img.icons8.com/color/48/000000/bash.png" alt="Bash">
            <img src="https://img.icons8.com/color/48/000000/mysql-logo.png" alt="MySQL">
        </div>
        <div class="socials animate-left">
            <a href="https://github.com/R0h1tAnand" target="_blank">
                <img src="https://img.icons8.com/fluent/48/000000/github.png" alt="GitHub">
            </a>
            <a href="https://linkedin.com/in/yourusername" target="_blank">
                <img src="https://img.icons8.com/color/48/000000/linkedin.png" alt="LinkedIn">
            </a>
            <a href="https://tryhackme.com/p/r0hit.A" target="_blank">
                <img src="https://assets.tryhackme.com/img/THMlogo.png" alt="TryHackMe"
                    style="width: 50px; height: 50px;">
            </a>
        </div>

    </div>
</body>

</html>
